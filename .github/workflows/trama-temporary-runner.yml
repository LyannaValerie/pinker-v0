name: Temporary Trama completion runner

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: ${{ github.head_ref == 'trama/completion-v2' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout writable branch
        uses: actions/checkout@v4
        with:
          ref: trama/completion-v2
          fetch-depth: 0

      - name: Decide whether this revision needs application
        id: gate
        shell: bash
        run: |
          message="$(git log -1 --pretty=%s)"
          if [[ "$message" == chore\(trama-bot\):* ]]; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
          else
            echo "apply=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Reconstruct and apply completion
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          cat scripts/trama_patch_chunks/*.b64 | base64 -d | gzip -d > scripts/apply_trama_completion.py
          python3 scripts/apply_trama_completion.py
          rm scripts/apply_trama_completion.py

      - name: Format and synchronize generated artifacts
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          cargo fmt
          cargo run --bin pink -- doc sincronizar
          cargo run --bin pink -- nav sincronizar

      - name: Validate full repository
        if: steps.gate.outputs.apply == 'true'
        run: make ci

      - name: Commit validated result
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          git config user.name "Trama Pinker Bot"
          git config user.email "151316340+LyannaValerie@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "chore(trama-bot): completa contratos e projeções da Trama"
          git push
