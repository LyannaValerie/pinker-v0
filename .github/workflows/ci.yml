name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

# Permissões mínimas: este CI apenas verifica (build, testes, lint, doc). Ele
# nunca faz push nem cria commits; declarar leitura explícita impede qualquer
# escrita na branch, mesmo que o padrão do repositório seja permissivo.
permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.78.0"
          components: rustfmt, clippy

      - name: Preflight
        run: ./ci_env.sh --preflight

      - name: cargo build
        run: ./ci_env.sh cargo build --locked

      - name: cargo check
        run: ./ci_env.sh cargo check --locked

      - name: cargo fmt --check
        run: ./ci_env.sh cargo fmt --check

      - name: cargo clippy
        run: ./ci_env.sh cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: ./ci_env.sh cargo test --locked

      - name: cargo doc
        run: ./ci_env.sh cargo doc --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"
