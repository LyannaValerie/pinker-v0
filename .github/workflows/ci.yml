name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo build
        run: cargo build --locked

      - name: cargo check
        run: cargo check --locked

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo test
        run: cargo test --locked
